global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    service: api-gateway

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ['gateway:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager:9093 when configured
