version: "3.9"

# ── Security & Compliance API Gateway + Observability Stack ───────────────────
#
# Services:
#   gateway        — Node.js/Fastify API gateway (this project)
#   redis          — Rate limiting & IP ban list store
#   prometheus     — Metrics scraping (Grafana data source)
#   grafana        — Dashboards for traffic, security, and latency
#   elasticsearch  — Transaction log store (ELK pipeline)
#   kibana         — Log exploration & security dashboards
#   logstash       — Log enrichment pipeline (optional)
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#   open http://localhost:3000/health
#   open http://localhost:3001          # Grafana
#   open http://localhost:5601          # Kibana

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

services:

  # ── API Gateway ─────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV:               production
      HOST:                   "0.0.0.0"
      PORT:                   "3000"
      TRUST_PROXY:            "true"
      JWT_SECRET:             "${JWT_SECRET}"
      REDIS_HOST:             redis
      REDIS_PORT:             "6379"
      ELK_ENABLED:            "true"
      ELASTICSEARCH_URL:      "http://elasticsearch:9200"
      ELK_INDEX:              "gateway-transactions"
      METRICS_ENABLED:        "true"
      OTEL_ENABLED:           "${OTEL_ENABLED:-false}"
      UPSTREAMS:              '${UPSTREAMS:-[]}'
      RATE_LIMIT_GLOBAL_MAX:  "${RATE_LIMIT_GLOBAL_MAX:-500}"
      DDOS_RPS:               "${DDOS_RPS:-100}"
      LOG_LEVEL:              "${LOG_LEVEL:-info}"
    depends_on:
      redis:         { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    networks:
      - gateway-net
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval:     15s
      timeout:      5s
      retries:      3
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - gateway-net
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    networks:
      - gateway-net

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP:    "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - elasticsearch
    networks:
      - gateway-net

  # ── Elasticsearch ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    restart: unless-stopped
    environment:
      discovery.type:          single-node
      xpack.security.enabled:  "false"
      ES_JAVA_OPTS:            "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - gateway-net
    healthcheck:
      test:         ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval:     20s
      timeout:      10s
      retries:      10
      start_period: 60s

  # ── Kibana ────────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      XPACK_SECURITY_ENABLED: "false"
    depends_on:
      elasticsearch: { condition: service_healthy }
    networks:
      - gateway-net
