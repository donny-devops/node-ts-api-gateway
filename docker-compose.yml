services:
  redis:
    image: redis:7-alpine
    container_name: api-gw-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gw-network

  db:
    image: postgres:16-alpine
    container_name: api-gw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gwuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gwpassword}
      POSTGRES_DB: ${POSTGRES_DB:-gwdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gwuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gw-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gw
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - gw-network

volumes:
  postgres_data:

networks:
  gw-network:
    driver: bridge
